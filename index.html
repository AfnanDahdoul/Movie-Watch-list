<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css" />
</head>

<body>

    <form name="MovieWatchList">
        <fieldset>
            <legend>Movie Watchlist</legend>
            <div class="mb-3">
                <label for="disabledTextInput" class="form-label">Movie</label>
                <input type="text" id="movieName" name="name" class="form-control" placeholder="Enter Movie Name">
            </div>

            <div class="mb-3">
                <label for="disabledTextInput" class="form-label">Genere</label>
                <input type="text" id="movieGenere" name="genere" class="form-control" placeholder="Genere">
            </div>

            <div class="mb-3">
                <label for="disabledTextInput" class="form-label">Rating</label>
                <input type="number" id="movieRating" name="rating" class="form-control" placeholder="Rating (1 - 10)">
            </div>
            <button type="submit" class="btn btn-addMovie">Add</button>
        </fieldset>
    </form>

    <div class="cards">

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./main.js"></script>
</body>

</html>
